<style>

    body { background:#0b1a2a; min-height:100vh; min-height:100dvh; display:flex; justify-content:center; align-items:flex-start; padding:12px; padding-top:max(12px,env(safe-area-inset-top)); padding-bottom:max(12px,env(safe-area-inset-bottom)); }

    #app { width:100%; max-width:480px; background:linear-gradient(145deg,#1a2f4c,#0f2135); border-radius:24px; padding:16px; box-shadow:0 20px 40px rgba(0,0,0,.7); border:1px solid #f5a62333; }

    .board { display:grid; grid-template-columns:repeat(10,1fr); gap:3px; background:#0b1a2a; border-radius:14px; padding:6px; border:1px solid #2a4a6a; }
    .cell { aspect-ratio:1; background:#11233a; border-radius:6px; position:relative; cursor:default; display:flex; align-items:center; justify-content:center; }
    .cell.reach { background:#16406a; cursor:pointer; box-shadow:inset 0 0 0 1px #4a90d9; }

    .cell.target { cursor:pointer; box-shadow:inset 0 0 0 2px #e74c3c; }

    .panel .who { display:flex; align-items:center; gap:8px; font-weight:700; }

    .actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }

    .spells .cancel { background:#e74c3c; color:#fff; border:none; border-radius:9px; padding:6px 9px; cursor:pointer; font-weight:800; }
    .hint { color:#8ba0b8; font-size:12px; margin-top:8px; text-align:center; }
    .log { margin-top:8px; background:#0b1a2a; border:1px solid #1a2f4c; border-radius:10px; padding:8px; height:74px; overflow-y:auto; font-size:12px; color:#b0c8dd; }
    .log div { padding:1px 0; border-bottom:1px solid #14283f; }
    .modal { position:fixed; inset:0; background:#000c; display:none; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(3px); }
    .modal.active { display:flex; }
    .modal .box { background:#1a2f4c; border-radius:20px; padding:24px; max-width:320px; text-align:center; border:1px solid #f5a62366; }
    .modal .box .em { font-size:48px; } .modal .box h2 { color:#f5f0e6; margin:8px 0; } .modal .box p { color:#b0c8dd; font-size:14px; }
    .modal .box button { margin-top:14px; background:#f5a623; border:none; border-radius:30px; padding:11px 28px; font-weight:800; color:#0f2135; cursor:pointer; }

    .bhead { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .bhead .title { font-weight:800; } .bhead .title span{ background:#f5a623; color:#0f2135; padding:1px 8px; border-radius:12px; font-size:13px; }
    .bhead .round { font-size:13px; color:#8ba0b8; }
    .trophy { background:#13301f; border:1px solid #2ecc7155; border-radius:12px; padding:8px 10px; font-size:12px; color:#bfe6cf; margin-bottom:10px; }
    .boss-banner { background:#3a1414; border:1px solid #e74c3c; border-radius:12px; padding:8px 10px; font-size:12px; color:#ffd0c8; margin-bottom:10px; font-weight:700; }
    .go.bossgo { background:#e74c3c; color:#fff; }
    .boardwrap { position:relative; }
    #fxLayer { position:absolute; inset:0; pointer-events:none; overflow:visible; z-index:5; }
    .dmgfx { position:absolute; transform:translate(-50%,-50%); color:#fff; font-weight:800; font-size:13px; text-shadow:0 1px 2px #000, 0 0 4px #000; animation:floatUp .85s ease-out forwards; }
    .dmgfx.crit { color:#f5c543; font-size:16px; }

    .hitfx { position:absolute; width:32px; height:32px; transform:translate(-50%,-50%); border-radius:50%; background:radial-gradient(circle, #ffffffcc 0%, #e74c3c00 70%); animation:hitPop .35s ease-out forwards; }

    .mute { background:transparent; border:none; cursor:pointer; font-size:16px; padding:0 4px; vertical-align:middle; }
    .resbar { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px; }

    .sect { font-size:11px; color:#8ba0b8; margin:12px 0 6px; letter-spacing:.5px; text-transform:uppercase; }
    .brow { display:flex; align-items:center; gap:8px; background:#0b1a2a; border:1px solid #2a4a6a; border-radius:12px; padding:8px 10px; margin-bottom:6px; }
    .brow .ic { font-size:22px; flex:0 0 auto; }
    .brow .nm { font-weight:700; font-size:14px; } .brow .sub { font-size:11px; color:#8ba0b8; }
    .brow .right { margin-left:auto; display:flex; align-items:center; gap:8px; flex:0 0 auto; }
    .lvlpips { display:flex; gap:3px; } .lvlpips i{ width:8px; height:8px; border-radius:2px; background:#2a4a6a; display:block; } .lvlpips i.on{ background:#f5a623; }
    .bbtn { background:#4a90d9; color:#fff; border:none; border-radius:9px; padding:7px 9px; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
    .bbtn:disabled { opacity:.4; cursor:default; }
    .bbtn.max { background:#2ecc71; color:#0f2135; }
    .cnt { font-weight:800; min-width:48px; text-align:right; font-size:13px; }
    .go { width:100%; margin-top:12px; background:#f5a623; color:#0f2135; border:none; border-radius:14px; padding:13px; font-size:16px; font-weight:800; cursor:pointer; }
    .go:disabled { opacity:.4; cursor:default; }
    #baseMsg { text-align:center; color:#f5a623; font-size:12px; min-height:16px; margin-top:6px; }
    #mapScreen { color:#f5f0e6; }
    .maphint { font-size:12px; color:#8ba0b8; margin:6px 0 8px; }
    .mapbox { position:relative; width:100%; height:330px; background:#0b1a2a; border:1px solid #2a4a6a; border-radius:14px; overflow:hidden; }
    .mapbox .edges { position:absolute; inset:0; width:100%; height:100%; }
    .node { position:absolute; transform:translate(-50%,-50%); background:#11233a; border:2px solid #4a6a8a; border-radius:12px; padding:3px 6px; display:flex; flex-direction:column; align-items:center; cursor:default; color:#f5f0e6; min-width:46px; z-index:2; }
    .node .ni { font-size:18px; line-height:1; }
    .node .nn { font-size:9px; white-space:nowrap; }
    .node.player { border-color:#2ecc71; }
    .node.enemy { border-color:#e74c3c; }
    .node.neutral { border-color:#8ba0b8; }
    .node.hq { box-shadow:0 0 0 2px #e74c3c55; }
    .node.can { cursor:pointer; box-shadow:0 0 0 3px #f5a62366; border-color:#f5a623; animation:pulse 1.2s infinite; }
    @keyframes pulse { 50% { box-shadow:0 0 0 6px #f5a62322; } }
    .node.can:hover { background:#1f4a78; }
    #mapMsg { text-align:center; color:#f5a623; font-size:12px; min-height:16px; margin:6px 0; }
</style>
</head>
<body>
<div id="app">
    <div id="baseScreen" style="display:none;"></div>
    <div id="mapScreen"></div>
    <div id="battleScreen" style="display:none;">
    <div class="top">
        <div class="title"><span>СКС</span> Герои · Бой с ЧП</div>
        <div class="round"><a href="index.html" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:20px;cursor:pointer;font-size:12px;padding:4px 10px;line-height:1;text-decoration:none;color:#f5f0e6;font-weight:600;">🏠 Назад</a><button id="musBtn" class="mute" title="Музыка">🎵</button><button id="muteBtn" class="mute" title="Звук">🔊</button> <span id="spLabel">🧠 3</span> · <span id="roundLabel">Раунд 1</span></div>

</div>

</div>
<script>
const COLS=10, ROWS=7;
const $=id=>document.getElementById(id);
const board=$('board'), orderBar=$('orderBar'), panel=$('panel'), logEl=$('log');
let units=[], uid=0;
const state={ round:0, order:[], ptr:-1, active:null, reach:{}, over:false, casting:null, hero:null, roundBuffs:[] };
const SPELLS=[
    {id:'premia',  icon:'✨', name:'Премия',  cost:1, hint:'+3 атаки на раунд'},
    {id:'zakupka', icon:'🚚', name:'Закупка', cost:2, hint:'вернуть бойцов'},
    {id:'avral',   icon:'⚡', name:'Аврал',   cost:2, hint:'доп. ход союзнику'},
    {id:'revive',  icon:'❤️', name:'Реанимация', cost:3, hint:'воскресить павших'},
];

function mk(side,name,icon,A,D,dmgMin,dmgMax,hp,count,speed,ranged,col,row){
    return {id:++uid, side, name, icon, A, D, dmgMin, dmgMax, hp, count, maxCount:count, curHp:hp, speed, ranged, abil:'',
            col, row, alive:true, acted:false, retaliated:false, defended:false, waited:false};
}
// ===== КАМПАНИЯ / ФИЛИАЛ =====
const UNIT_BASE=[
    {key:'sb', name:'СБ-охрана', icon:'🛡️', fig:'guard',   A:4,D:8,dmgMin:2,dmgMax:3,hp:15,speed:3,ranged:false,abil:'guard', count:10},
    {key:'pr', name:'Прораб',     icon:'👷', fig:'builder', A:8,D:5,dmgMin:4,dmgMax:6,hp:12,speed:4,ranged:false,abil:'crit',  count:10},
    {key:'dr', name:'Водитель',   icon:'🚐', fig:'driver',  A:5,D:4,dmgMin:2,dmgMax:4,hp:8, speed:6,ranged:false,abil:'evade', count:8},
    {key:'it', name:'IT-инженер', icon:'💻', fig:'it',      A:6,D:3,dmgMin:3,dmgMax:5,hp:6, speed:4,ranged:true, abil:'pierce',count:8},
];
const ENEMY_BASE=[
    {name:'Пожар',    icon:'🔥', fig:'fire',      A:7,D:3,dmgMin:3,dmgMax:5,hp:8, speed:5,ranged:false, count:9, row:1},
    {name:'Протечка', icon:'💧', fig:'water',     A:3,D:6,dmgMin:2,dmgMax:3,hp:14,speed:2,ranged:false, count:8, row:3},
    {name:'Проверка', icon:'📋', fig:'inspector', A:6,D:4,dmgMin:3,dmgMax:4,hp:7, speed:3,ranged:true,  count:7, row:5},
];
const FIANIT_BASE=[
    {name:'Директор Фианита', icon:'💼', fig:'fianit_lead', A:8,D:6,dmgMin:4,dmgMax:6,hp:16,speed:4,ranged:false,abil:'lead',  count:6, row:2},
    {name:'Оценщик Фианита',  icon:'🏪', fig:'fianit_appr', A:7,D:4,dmgMin:4,dmgMax:6,hp:8, speed:3,ranged:true, abil:'pierce',count:8, row:0},
    {name:'ЧОП Фианита',      icon:'🛡️', fig:'fianit_chop', A:5,D:8,dmgMin:3,dmgMax:4,hp:16,speed:3,ranged:false,abil:'guard', count:8, row:4},
    {name:'Логист Фианита',   icon:'🚚', fig:'fianit_log',  A:6,D:4,dmgMin:3,dmgMax:5,hp:9, speed:6,ranged:false,abil:'evade', count:7, row:6},
];
const KOSHELEK_BASE=[
    {name:'Управляющий Кошелька', icon:'👔', fig:'kosh_lead', A:7,D:5,dmgMin:3,dmgMax:5,hp:14,speed:4,ranged:false,abil:'lead',  count:7, row:2},
    {name:'Скупщик Кошелька',     icon:'💵', fig:'kosh_appr', A:6,D:3,dmgMin:3,dmgMax:5,hp:7, speed:3,ranged:true, abil:'pierce',count:10,row:0},
    {name:'Инкассатор Кошелька',  icon:'🏦', fig:'kosh_chop', A:4,D:7,dmgMin:2,dmgMax:4,hp:14,speed:3,ranged:false,abil:'guard', count:9, row:4},
    {name:'Агент Кошелька',       icon:'🤝', fig:'kosh_log',  A:6,D:4,dmgMin:3,dmgMax:4,hp:8, speed:6,ranged:false,abil:'evade', count:9, row:6},
];
function bossRoster(i){ return (NODE_FACTION[i]==='koshelek') ? KOSHELEK_BASE : FIANIT_BASE; }
function factionName(i){ return NODE_FACTION[i]==='koshelek' ? 'Кошелёк' : (campaign.map.type[i]==='boss' ? 'Фианит' : 'конкурент'); }
function isBoss(L){ return L%5===0; }
const CITY=[
    {name:'Уфа', x:46,y:46},
    {name:'Бирск', x:40,y:24},
    {name:'Нефтекамск', x:22,y:18},
    {name:'Туймазы', x:20,y:50},
    {name:'Октябрьский', x:18,y:72},
    {name:'Стерлитамак', x:46,y:72},
    {name:'Янаул', x:66,y:56},
    {name:'Дюртюли', x:64,y:85},
    {name:'Челябинск', x:86,y:44},
    {name:'Самара', x:9,y:60},
];
const EDGES=[[0,1],[0,3],[0,5],[0,6],[1,2],[3,2],[3,4],[4,5],[5,6],[6,7],[5,7],[6,8],[7,8],[3,9],[4,9]];
const NODE_LVL =[0, 2, 3, 2, 3, 2, 2, 3, 5, 5];
const NODE_TYPE=['home','chp','res','chp','chp','chp','chp','chp','boss','boss'];
const NODE_FACTION=['','','','','','','','','fianit','koshelek'];
function neighbors(i){ const s=new Set(); EDGES.forEach(e=>{ if(e[0]===i)s.add(e[1]); if(e[1]===i)s.add(e[0]); }); return [...s]; }
// ===== РИСОВАННЫЕ ФИГУРКИ (вместо эмодзи) =====
const FIG={
    guard:      {coat:'#22344c', skin:'#e3b288', hair:'#3a2a1a', head:'cap',     emblem:'#f5a623'},
    builder:    {coat:'#c0792a', skin:'#eab885', hair:'#3a2a1a', head:'helmet',  emblem:'#f5c543'},
    driver:     {coat:'#2e6e8b', skin:'#eab885', hair:'#222',    head:'capblue'},
    it:         {coat:'#3a5a8a', skin:'#f0c89a', hair:'#3a2a1a', head:'headset'},
    inspector:  {coat:'#7a5a2a', skin:'#eab885', hair:'#444',    head:'hair', glasses:true},
    fianit_lead:{coat:'#5a2330', skin:'#e3b288', hair:'#222',    head:'hair', tie:'#c0392b'},

    kosh_lead:  {coat:'#2a3b66', skin:'#e3b288', hair:'#222',    head:'hair', tie:'#f5a623'},
    kosh_appr:  {coat:'#2a4b66', skin:'#f0c89a', hair:'#3a2a1a', head:'hair', glasses:true},
    kosh_chop:  {coat:'#23364a', skin:'#e3b288', hair:'#222',    head:'cap',  emblem:'#4a90d9'},
    kosh_log:   {coat:'#2a5b6a', skin:'#eab885', hair:'#222',    head:'capblue'},
};
function personSVG(p){
    let acc='';
    if(p.head==='helmet') acc=`<path d="M10 15 Q10 7 20 7 Q30 7 30 15 Z" fill="${p.emblem}"/><rect x="9" y="14.3" width="22" height="2.2" rx="1" fill="#0009"/><rect x="19" y="7.3" width="2" height="6" fill="#0006"/>`;
    else if(p.head==='cap') acc=`<path d="M10.5 14 Q20 5 29.5 14 L29.5 15.6 L10.5 15.6 Z" fill="#1a2535"/><rect x="10.5" y="14.6" width="19" height="2.4" fill="#0f1826"/>${p.emblem?`<rect x="18.4" y="10.6" width="3.2" height="3" rx="0.5" fill="${p.emblem}"/>`:''}`;
    else if(p.head==='capblue') acc=`<path d="M11 14 Q20 6 29 14 L29 15.6 L11 15.6 Z" fill="#243a52"/><rect x="11" y="14.6" width="18" height="2.2" fill="#16283a"/>`;
    else acc=`<path d="M12.3 16 Q12 8.5 20 8.5 Q28 8.5 27.7 16 Q24 12 20 12 Q16 12 12.3 16 Z" fill="${p.hair}"/>`;
    const glasses=p.glasses?`<rect x="14" y="17.6" width="4.6" height="3.1" rx="0.8" fill="none" stroke="#111" stroke-width="0.9"/><rect x="21.4" y="17.6" width="4.6" height="3.1" rx="0.8" fill="none" stroke="#111" stroke-width="0.9"/><line x1="18.6" y1="19.1" x2="21.4" y2="19.1" stroke="#111" stroke-width="0.9"/>`:'';

function computeTrophy(L){

const key=(c,r)=>c+','+r;
const randInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const cheb=(c1,r1,c2,r2)=>Math.max(Math.abs(c1-c2),Math.abs(r1-r2));
const adjacent=(a,b)=>cheb(a.col,a.row,b.col,b.row)===1;
function unitAt(c,r){ return units.find(u=>u.alive&&u.col===c&&u.row===r)||null; }
function occupied(except){ const s={}; units.forEach(u=>{ if(u.alive&&u!==except) s[key(u.col,u.row)]=1; }); return s; }
function inGrid(c,r){ return c>=0&&c<COLS&&r>=0&&r<ROWS; }
function neighborsFree(t){ const out=[]; for(let dc=-1;dc<=1;dc++)for(let dr=-1;dr<=1;dr++){ if(!dc&&!dr)continue; const c=t.col+dc,r=t.row+dr; if(inGrid(c,r)&&!unitAt(c,r)) out.push({col:c,row:r}); } return out; }

function reachable(u){
    const occ=occupied(u), res={}; res[key(u.col,u.row)]=0;
    let frontier=[[u.col,u.row,0]];
    while(frontier.length){
        const [c,r,d]=frontier.shift();
        if(d>=u.speed) continue;
        for(let dc=-1;dc<=1;dc++)for(let dr=-1;dr<=1;dr++){
            if(!dc&&!dr)continue;
            const nc=c+dc,nr=r+dr,k=key(nc,nr);
            if(inGrid(nc,nr)&&!occ[k]&&res[k]===undefined){ res[k]=d+1; frontier.push([nc,nr,d+1]); }
        }
    }
    delete res[key(u.col,u.row)];
    return res;
}

function log(msg){ const d=document.createElement('div'); d.textContent=msg; logEl.appendChild(d); logEl.scrollTop=logEl.scrollHeight; }

function applyDamage(t,dmg){
    const total=(t.count-1)*t.hp+t.curHp, left=total-dmg;
    if(left<=0){ t.count=0; t.curHp=0; t.alive=false; return t.count; }
    t.count=Math.ceil(left/t.hp); t.curHp=left-(t.count-1)*t.hp; return t.count;
}
function calcDamage(a,d){
    let base=a.count*randInt(a.dmgMin,a.dmgMax);
    state._crit=false;
    if(a.abil==='crit' && Math.random()<0.2){ base=Math.round(base*1.5); state._crit=true; }
    let def=d.D+(d.defended?3:0);
    if(a.abil==='pierce') def=Math.max(0,def-2);
    const mod = a.A>=def ? (1+0.05*(a.A-def)) : (1/(1+0.05*(def-a.A)));
    let dmg=base*mod;
    if(d.abil==='guard' && !a.ranged) dmg*=0.8;
    return Math.max(1,Math.round(dmg));
}
function doAttack(a,d,isRetal){
    const dmg=calcDamage(a,d), before=d.count, crit=state._crit;
    applyDamage(d,dmg);
    const killed=before-d.count;
    fxHit(d.col,d.row,dmg,crit); sndHit(crit,a.ranged);
    log(`${a.icon} ${a.name} → ${d.icon} ${d.name}: −${dmg}${crit?' 💢крит':''}${killed?` (−${killed} ед.)`:''}`);
    if(!d.alive){ log(`💀 ${d.icon} ${d.name} ликвидирован!`); sndDeath(); return; }
    if(!isRetal && !a.ranged && a.abil!=='evade' && !d.retaliated){
        d.retaliated=true;
        const r=calcDamage(d,a), bc=a.count; applyDamage(a,r); const k=bc-a.count;
        log(`↩️ ${d.icon} ${d.name} в ответ: −${r}${k?` (−${k} ед.)`:''}`);
    }
}

function startCast(spell){
    const h=state.hero;
    if(h.castThisRound){ $('hint').textContent='В этом раунде решение уже принято.'; return; }
    if(h.sp<spell.cost){ $('hint').textContent='Не хватает очков решений.'; return; }
    if(spell.id==='revive'){ applyRevive(); return; }
    state.casting = (state.casting && state.casting.id===spell.id) ? null : spell;
    $('hint').textContent = state.casting ? `Выберите союзника для «${spell.name}»` : 'Кликни врага — атака, синюю клетку — перемещение.';
    render();
}
function applySpell(spell,t){
    const h=state.hero;
    if(h.castThisRound || h.sp<spell.cost) return;
    h.sp-=spell.cost; h.castThisRound=true; state.casting=null; sndSpell();
    if(spell.id==='premia'){ t.A+=3; state.roundBuffs.push({u:t,atk:3}); log(`✨ Премия: ${t.icon} ${t.name} +3 атаки`); }
    else if(spell.id==='zakupka'){
        const heal=Math.round(0.4*t.maxCount*t.hp);
        let total=(t.count-1)*t.hp+t.curHp; total=Math.min(t.maxCount*t.hp, total+heal);
        const nc=Math.ceil(total/t.hp), gained=nc-t.count; t.count=nc; t.curHp=total-(nc-1)*t.hp;
        log(`🚚 Срочная закупка: ${t.icon} ${t.name} +${gained} ед.`);
    } else if(spell.id==='avral'){
        t.acted=false; const idx=state.order.indexOf(t); if(idx>=0) state.order.splice(idx,1);
        state.order.splice(state.ptr+1,0,t); log(`⚡ Аврал: ${t.icon} ${t.name} получает доп. ход`);
    }
    $('hint').textContent='Кликни врага — атака, синюю клетку — перемещение.';
    render();
}
function freeCell(){
    for(let c=0;c<4;c++) for(let r=0;r<ROWS;r++){ if(!unitAt(c,r)) return {col:c,row:r}; }
    for(let c=0;c<COLS;c++) for(let r=0;r<ROWS;r++){ if(!unitAt(c,r)) return {col:c,row:r}; }
    return null;
}
function applyRevive(){
    const h=state.hero;
    if(h.castThisRound || h.sp<3) return;
    const dead=units.find(u=>u.side==='player' && !u.alive);
    if(dead){
        const cell=freeCell();
        if(!cell){ $('hint').textContent='Нет места для воскрешения.'; return; }
        h.sp-=3; h.castThisRound=true; state.casting=null; sndSpell();
        dead.alive=true; dead.count=Math.max(1,Math.round(dead.maxCount*0.4)); dead.curHp=dead.hp;
        dead.defended=false; dead.retaliated=false; dead.acted=true; dead.burning=false;
        dead.col=cell.col; dead.row=cell.row;
        log(`❤️ Реанимация: ${dead.icon} ${dead.name} воскрешён (${dead.count} ед.)!`);
    } else {
        const alive=units.filter(u=>u.side==='player'&&u.alive);
        if(!alive.length) return;
        const t=alive.slice().sort((a,b)=>(a.count/a.maxCount)-(b.count/b.maxCount))[0];
        h.sp-=3; h.castThisRound=true; state.casting=null; sndSpell();
        t.count=t.maxCount; t.curHp=t.hp;
        log(`❤️ Реанимация: ${t.icon} ${t.name} полностью восстановлен!`);
    }
    $('hint').textContent='Кликни врага — атака, синюю клетку — перемещение.';
    render();
}
function newRound(){
    state.round++;
    state.roundBuffs.forEach(b=>{ b.u.A-=b.atk; }); state.roundBuffs=[];
    if(state.round>1) state.hero.sp=Math.min(state.hero.max, state.hero.sp+1);
    if(state.round>1 && state.bossFaction==='fianit'){
        const before=campaign.res.budget; campaign.res.budget=Math.max(0,campaign.res.budget-4);
        log(`💸 Демпинг Фианита: бюджет −${before-campaign.res.budget}.`);
    }
    if(state.round>1 && state.bossFaction==='koshelek'){
        let healed=false;
        units.filter(u=>u.side==='enemy'&&u.alive).forEach(u=>{
            const total=(u.count-1)*u.hp+u.curHp, heal=Math.round(0.12*u.maxCount*u.hp);
            const nt=Math.min(u.maxCount*u.hp, total+heal), nc=Math.ceil(nt/u.hp);
            if(nc>u.count){ u.count=nc; u.curHp=nt-(nc-1)*u.hp; healed=true; }
        });
        if(healed) log('🪙 Скупка Кошелька: враг пополнил ряды.');
    }
    state.hero.castThisRound=false; state.casting=null;
    units.forEach(u=>{ u.acted=false; u.retaliated=false; u.defended=false; u.waited=false; });
    state.order=units.filter(u=>u.alive).sort((a,b)=> b.speed-a.speed || (Math.random()-0.5));
    state.ptr=-1;
    advance();
}
function advance(){
    if(state.over) return;
    state.ptr++;
    while(state.ptr<state.order.length && (!state.order[state.ptr].alive || state.order[state.ptr].acted)) state.ptr++;
    if(state.ptr>=state.order.length){ newRound(); return; }
    state.active=state.order[state.ptr];
    state.reach = state.active.side==='player' ? reachable(state.active) : {};
    render();
    if(state.active.side==='enemy') setTimeout(aiTurn,650);
}
function endTurn(u){
    u.acted=true; state.reach={}; render();
    if(checkEnd()) return;
    setTimeout(advance,320);
}
function checkEnd(){
    const p=units.some(u=>u.side==='player'&&u.alive);
    const e=units.some(u=>u.side==='enemy'&&u.alive);
    if(!e){ endBattle(true); return true; }
    if(!p){ endBattle(false); return true; }
    return false;
}

function playerAttack(a,t){
    if(a.ranged){ doAttack(a,t); endTurn(a); return; }
    if(adjacent(a,t)){ doAttack(a,t); endTurn(a); return; }
    let best=null,bd=1e9;
    neighborsFree(t).forEach(c=>{ const k=key(c.col,c.row); if(state.reach[k]!==undefined && state.reach[k]<bd){ bd=state.reach[k]; best=c; } });
    if(best){ a.col=best.col; a.row=best.row; doAttack(a,t); endTurn(a); }
    else { $('hint').textContent='⚠️ Не достать — нет пути вплотную к цели.'; }
}
function onCell(c,r){
    if(state.over) return;
    const a=state.active; if(!a || a.side!=='player') return;
    const tgt=unitAt(c,r);
    if(state.casting){ if(tgt && tgt.side==='player' && tgt.alive) applySpell(state.casting,tgt); return; }
    if(tgt && tgt.side==='enemy'){ playerAttack(a,tgt); return; }
    if(!tgt && state.reach[key(c,r)]!==undefined){ a.col=c; a.row=r; sndMove(); log(`${a.icon} ${a.name} занимает позицию`); endTurn(a); }
}

function aiTurn(){
    if(state.over) return;
    const u=state.active; if(!u||!u.alive){ advance(); return; }
    const foes=units.filter(x=>x.side==='player'&&x.alive);
    if(!foes.length){ checkEnd(); return; }
    if(u.ranged){ const t=foes.slice().sort((a,b)=>a.count-b.count)[0]; doAttack(u,t); endTurn(u); return; }
    const t=foes.slice().sort((a,b)=> cheb(u.col,u.row,a.col,a.row)-cheb(u.col,u.row,b.col,b.row) || a.count-b.count)[0];
    if(adjacent(u,t)){ doAttack(u,t); endTurn(u); return; }
    const reach=reachable(u);
    let best=null,bd=1e9;
    neighborsFree(t).forEach(c=>{ const k=key(c.col,c.row); if(reach[k]!==undefined && reach[k]<bd){ bd=reach[k]; best=c; } });
    if(best){ u.col=best.col; u.row=best.row; log(`${u.icon} ${u.name} надвигается`); doAttack(u,t); endTurn(u); return; }
    let mb=null,md=1e9;
    Object.keys(reach).forEach(k=>{ const [c,r]=k.split(',').map(Number); const d=cheb(c,r,t.col,t.row); if(d<md){ md=d; mb={col:c,row:r}; } });
    if(mb){ u.col=mb.col; u.row=mb.row; log(`${u.icon} ${u.name} движется к команде`); }
    endTurn(u);
}

// ===== ЗВУК (Web Audio, без файлов) =====
const SND={on:true};
const MUS={on:true, playing:false, step:0, timer:null};
let _actx=null, _noise=null;
function actx(){ if(!_actx){ try{ _actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _actx; }
function tone(freq,dur,type,vol,slideTo){
    if(!SND.on) return; const c=actx(); if(!c) return; if(c.state==='suspended') c.resume();
    const o=c.createOscillator(), g=c.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,c.currentTime);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), c.currentTime+dur);
    g.gain.setValueAtTime(vol||0.05, c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+dur);
    o.connect(g); g.connect(c.destination); o.start(); o.stop(c.currentTime+dur+0.02);
}
function noiseBurst(dur,vol,freq){
    if(!SND.on) return; const c=actx(); if(!c) return; if(c.state==='suspended') c.resume();
    if(!_noise){ _noise=c.createBuffer(1,c.sampleRate,c.sampleRate); const d=_noise.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1; }
    const s=c.createBufferSource(); s.buffer=_noise;
    const f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq||1500; f.Q.value=0.7;
    const g=c.createGain(); g.gain.setValueAtTime(vol||0.05,c.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,c.currentTime+dur);
    s.connect(f); f.connect(g); g.connect(c.destination); s.start(); s.stop(c.currentTime+dur+0.02);
}
// SFX в духе Героев
function sndHit(crit,ranged){
    if(ranged){ tone(760,0.12,'sawtooth',0.045,300); noiseBurst(0.08,0.03,2600); }
    else { noiseBurst(0.11,0.06,1700); tone(200,0.12,'square',0.05,90); }
    if(crit){ setTimeout(()=>{ tone(880,0.12,'square',0.05,1500); noiseBurst(0.1,0.04,3200); },50); }
}
function sndDeath(){ tone(240,0.5,'sawtooth',0.06,60); noiseBurst(0.4,0.04,500); }
function sndMove(){ noiseBurst(0.12,0.025,900); }
function sndSpell(){ tone(420,0.3,'sine',0.05,1200); setTimeout(()=>tone(1200,0.18,'sine',0.035,1800),120); }
function sndWin(){ [392,523,659,784,1046].forEach((f,i)=>setTimeout(()=>{ tone(f,0.22,'triangle',0.06); tone(f/2,0.22,'sine',0.03); },i*130)); }
function sndLose(){ tone(330,0.7,'sawtooth',0.06,90); tone(247,0.7,'sawtooth',0.04,70); }

// ===== ФОНОВАЯ МУЗЫКА (оригинальный медиэвал-луп в духе Героев) =====
const MUS_BASS=[110.00,110.00,87.31,98.00];
const MUS_PAD =[[220,261.63,329.63],[220,261.63,329.63],[174.61,220,261.63],[196,246.94,293.66]];
const MUS_MEL =[659.25,0,587.33,659.25, 783.99,0,659.25,587.33, 523.25,0,587.33,523.25, 493.88,0,587.33,659.25];
const MUS_BEAT=430;
function musNote(freq,dur,type,vol){
    const c=actx(); if(!c||!MUS.on) return; if(c.state==='suspended') c.resume();
    const t=c.currentTime, o=c.createOscillator(), g=c.createGain();
    o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.08);
    g.gain.setValueAtTime(vol,t+Math.max(0.1,dur-0.18)); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+0.05);
}
function musicTick(){
    if(!MUS.on || !MUS.playing) return;
    const s=MUS.step%16, grp=Math.floor(s/4);
    if(s%4===0){ musNote(MUS_BASS[grp],MUS_BEAT/1000*4,'triangle',0.05); MUS_PAD[grp].forEach(f=>musNote(f,MUS_BEAT/1000*4,'sine',0.016)); }
    const m=MUS_MEL[s]; if(m) musNote(m,MUS_BEAT/1000*0.9,'triangle',0.032);
    MUS.step++;
    MUS.timer=setTimeout(musicTick,MUS_BEAT);
}
function startMusic(){ if(MUS.playing||!MUS.on) return; const c=actx(); if(!c) return; if(c.state==='suspended') c.resume(); MUS.playing=true; MUS.step=0; musicTick(); }
function stopMusic(){ MUS.playing=false; if(MUS.timer){ clearTimeout(MUS.timer); MUS.timer=null; } }

// ===== ПОБЕДНАЯ «АЛЛИЛУЙЯ» (мотив Генделя «Мессия», public domain) =====
function voiceChord(freqs,dur,vol){ if(!SND.on) return; freqs.forEach(f=>{ tone(f,dur,'sine',vol); tone(f*2,dur,'triangle',vol*0.35); }); }
function sndHallelujah(){
    if(!SND.on) return;
    const A=440,D=587.33,Fs=739.99,Ah=880;
    const seq=[[[A],95],[[A],95],[[D],270],[[D],210],[[],110],[[A],95],[[A],95],[[D],270],[[D],210],[[],110],[[Fs],95],[[Fs],95],[[Ah],320],[[Ah],260]];
    let t=0; seq.forEach(function(p){ var fs=p[0], ms=p[1]; if(fs.length) setTimeout(function(){ voiceChord(fs,ms/1000*1.1,0.06); },t); t+=ms; });
    setTimeout(function(){ voiceChord([293.66,369.99,440,587.33],1.3,0.06); }, t+160);
}

// ===== АНИМАЦИИ УДАРОВ =====
function fxAt(col,row,makeEl){
    const cell=board.children[row*COLS+col]; const layer=$('fxLayer'); if(!cell||!layer) return;
    const cr=cell.getBoundingClientRect(), lr=layer.getBoundingClientRect();
    const el=makeEl(); el.style.left=(cr.left-lr.left+cr.width/2)+'px'; el.style.top=(cr.top-lr.top+cr.height/2)+'px';
    layer.appendChild(el); setTimeout(()=>el.remove(),900);
}
function fxHit(col,row,dmg,crit){
    fxAt(col,row,()=>{ const f=document.createElement('div'); f.className='hitfx'; return f; });
    fxAt(col,row,()=>{ const d=document.createElement('div'); d.className='dmgfx'+(crit?' crit':''); d.textContent='−'+dmg+(crit?'!':''); return d; });
}

function render(){
    $('roundLabel').textContent='Раунд '+state.round;
    if(state.hero) $('spLabel').textContent='🧠 '+state.hero.sp;
    orderBar.innerHTML='';
    state.order.forEach(u=>{
        const c=document.createElement('div');
        c.className='chip'+(u===state.active?' active':'')+(u.side==='enemy'?' enemy':'')+(!u.alive?' dead':'');
        c.textContent=u.icon; orderBar.appendChild(c);
    });
    board.innerHTML='';
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
        const cell=document.createElement('div'); cell.className='cell';
        const u=unitAt(c,r);
        const playerTurn=state.active&&state.active.side==='player'&&!state.over;
        const casting=playerTurn&&state.casting;
        if(u){
            const d=document.createElement('div');
            d.className='u '+u.side+(u===state.active?' active':'');
            const hpPct=Math.round(((u.curHp+(u.count-1)*u.hp)/(u.count*u.hp||1))*100);
            d.innerHTML=`<div class="hpbar"><span style="width:${Math.max(0,Math.min(100,hpPct))}%"></span></div><div class="ic">${u.icon}</div><div class="cnt">${u.count}</div>`;
            cell.appendChild(d);
            if(casting && u.side==='player') cell.classList.add('cast');
            else if(playerTurn && !casting && u.side==='enemy') cell.classList.add('target');
        } else if(playerTurn && !casting && state.reach[key(c,r)]!==undefined){
            cell.classList.add('reach');
        }
        cell.addEventListener('click',()=>onCell(c,r));
        board.appendChild(cell);
    }
    renderPanel();
}
function renderPanel(){
    const u=state.active;
    if(!u){ panel.innerHTML=''; return; }
    const turnOf = u.side==='player'?'🟦 Ваш ход':'🟥 Ходит ЧП';
    panel.innerHTML=`
        <div class="who"><span class="big">${u.icon}</span><span>${u.name}</span><span style="margin-left:auto;font-size:12px;color:#8ba0b8;">${turnOf}</span></div>
        <div class="stats">
            <span>⚔️ Атака <b>${u.A}</b></span><span>🛡️ Защита <b>${u.D}${u.defended?'+3':''}</b></span>
            <span>💥 Урон <b>${u.dmgMin}–${u.dmgMax}</b></span><span>❤️ HP <b>${u.hp}</b></span>
            <span>👥 Кол-во <b>${u.count}</b></span><span>🏃 Скорость <b>${u.speed}</b></span>
            <span>${u.ranged?'🎯 Дальний':'🤺 Ближний'}</span>
        </div>
        ${u.side==='player'?`<div class="actions">
            <button class="def" id="bDef">🛡️ Защита</button>
            ${!u.waited?'<button class="wait" id="bWait">⏳ Ждать</button>':''}
        </div>
        <div class="spells">
            ${SPELLS.map(s=>`<button class="spell${state.casting&&state.casting.id===s.id?' on':''}" data-sp="${s.id}" ${(state.hero.castThisRound||state.hero.sp<s.cost)?'disabled':''} title="${s.hint}">${s.icon} ${s.name} <i>${s.cost}</i></button>`).join('')}
            ${state.casting?'<button class="cancel" id="bCancel">✖</button>':''}
        </div>`:''}`;
    if(u.side==='player'){
        $('bDef').addEventListener('click',()=>{ u.defended=true; log(`${u.icon} ${u.name} занял оборону`); endTurn(u); });
        const w=$('bWait'); if(w) w.addEventListener('click',()=>{ u.waited=true; state.order.splice(state.ptr,1); state.order.push(u); state.ptr--; state.reach={}; render(); advance(); });
        panel.querySelectorAll('.spell').forEach(b=>b.addEventListener('click',()=>{ if(b.disabled) return; startCast(SPELLS.find(s=>s.id===b.dataset.sp)); }));
        const cb=$('bCancel'); if(cb) cb.addEventListener('click',()=>{ state.casting=null; $('hint').textContent='Кликни врага — атака, синюю клетку — перемещение.'; render(); });
    }
}

function endBattle(won){
    state.over=true;
    const node=state.pendingNode, nm=node!=null?CITY[node].name:'';
    if(won){
        const m=campaign.map, L=m.level[node], wasBoss=nodeIsBoss(node), wasHQ=m.type[node]==='boss';
        if(wasBoss) sndHallelujah(); else sndWin();
        units.filter(u=>u.side==='player').forEach(u=>{ const t=campaign.roster.find(x=>x.key===u.key); if(t) t.count=u.alive?u.count:0; });
        const trophy=computeTrophy(L);
        if(wasBoss){ trophy.budget=Math.round(trophy.budget*1.5); trophy.equip=Math.round(trophy.equip*1.5); trophy.mat=Math.round(trophy.mat*1.5); trophy.staff=Math.round(trophy.staff*1.5); }
        campaign.res.budget+=trophy.budget; campaign.res.equip+=trophy.equip; campaign.res.mat+=trophy.mat; campaign.res.staff+=trophy.staff;
        campaign.lastTrophy=trophy;
        const faction = wasHQ ? factionName(node) : '';
        captureNode(node); fianitSpread(); state.pendingNode=null;
        if(wasHQ){
            const bossesLeft = m.type.filter((t,i)=> t==='boss' && m.owner[i]==='enemy').length;
            if(bossesLeft===0){
                log(`🏆 «${faction}» разбит! Все конкуренты повержены.`);
                $('mEm').textContent='🏆'; $('mTitle').textContent='Регион ваш!';
                $('mDesc').textContent=`Оба конкурента — «Фианит» и «Кошелёк» — вытеснены. ГК «СКС» контролирует регион!`;
                $('mBtn').textContent='🔄 Новая кампания';
                $('modal').classList.add('active');
            } else {
                log(`🏆 Штаб «${faction}» в г. ${nm} взят! Остался ещё один конкурент.`);
                setTimeout(showMap, 900);
            }
        } else {
            log(`🏆 ${nm} взят! Трофеи: 💰+${trophy.budget}. Возврат на карту.`);
            setTimeout(showMap, 900);
        }
    } else {
        sndLose();
        state.pendingNode=null;
        $('mEm').textContent='😞';
        $('mTitle').textContent='Команда разбита';
        $('mDesc').textContent=`Поражение в г. ${nm} на раунде ${state.round}. Кампания окончена.`;
        $('mBtn').textContent='🔄 Новая кампания';
        $('modal').classList.add('active');
    }
}
$('mBtn').addEventListener('click',startCampaign);
function updateBtns(){ const b=$('muteBtn'); if(b) b.textContent=SND.on?'🔊':'🔇'; const m=$('musBtn'); if(m){ m.textContent='🎵'; m.style.opacity=MUS.on?'1':'0.35'; } }
try{ SND.on=localStorage.getItem('sks_snd')!=='0'; MUS.on=localStorage.getItem('sks_mus')!=='0'; }catch(e){}
$('muteBtn').addEventListener('click',(e)=>{ e.stopPropagation(); SND.on=!SND.on; try{localStorage.setItem('sks_snd',SND.on?'1':'0');}catch(e){} updateBtns(); if(SND.on) sndMove(); });
$('musBtn').addEventListener('click',(e)=>{ e.stopPropagation(); MUS.on=!MUS.on; try{localStorage.setItem('sks_mus',MUS.on?'1':'0');}catch(e){} if(MUS.on) startMusic(); else stopMusic(); updateBtns(); });
document.addEventListener('click',function once(){ const c=actx(); if(c&&c.state==='suspended') c.resume(); if(MUS.on) startMusic(); }, {once:true});
updateBtns();
startCampaign();
</script>
